<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Takie | Portfolio</title>

<!-- Google Font -->
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: 'Inter', sans-serif;
}

body {
  background: linear-gradient(135deg, #0a0f1f, #0d1b2a, #000814);
  color: #fff;
  min-height: 100vh;
}

/* Container */
.container {
  width: 90%;
  max-width: 1100px;
  margin: auto;
  padding: 40px 0;
}

/* Glass Effect */
.glass {
  background: rgba(255, 255, 255, 0.05);
  border-radius: 16px;
  backdrop-filter: blur(12px);
  -webkit-backdrop-filter: blur(12px);
  border: 1px solid rgba(255,255,255,0.1);
  padding: 20px;
}

/* Hero */
.hero {
  text-align: center;
  margin-top: 40px;
}

.hero img {
  width: 120px;
  height: 120px;
  border-radius: 50%;
  margin-bottom: 15px;
  border: 2px solid rgba(255,255,255,0.2);
}

.hero h1 {
  font-weight: 600;
  font-size: 28px;
}

.hero p {
  opacity: 0.7;
  margin-top: 8px;
}

/* Socials */
.socials {
  display: flex;
  justify-content: center;
  flex-wrap: wrap;
  gap: 10px;
}
.socials a {
  display: inline-block;
  margin: 0 10px;
  font-size: 18px;
  color: white;
  padding: 10px;
  border-radius: 10px;
  background: rgba(255,255,255,0.05);
  backdrop-filter: blur(10px);
  transition: 0.3s;
}

.socials a:hover {
  transform: scale(1.1);
  background: rgba(255,255,255,0.1);
}
/* Section Title */
.section-title {
  margin: 40px 0 20px;
  font-size: 20px;
  opacity: 0.8;
}

/* Works Grid */
.works {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
  gap: 20px;
}

.work {
  overflow: hidden;
  cursor: pointer;
  transition: 0.3s;
}

.work img {
  width: 100%;
  border-radius: 12px;
}

.work:hover {
  transform: translateY(-5px);
}

/* Footer */
.footer {
  text-align: center;
  margin-top: 40px;
  opacity: 0.5;
  font-size: 14px;
}
</style>
</head>

<body>

<div class="container">

  <!-- HERO -->
  <div class="hero glass">
    <img src="tkz.jpg" alt="Profile">
    <h1>Ahmad Abdullah Takie</h1>
    <p>Brand Designer • Programmer</p>

<div class="socials">
  <a href="https://github.com/tkzfallen"><i class="fab fa-github"></i></a>
  <a href="https://instagram.com/tkzfallen"><i class="fab fa-instagram"></i></a>
  <a href="https://behance.net/tkzfallen"><i class="fab fa-behance"></i></a>
  <a href="https://linkedin.com/in/tkzfallen"><i class="fab fa-linkedin"></i></a>
  <a href="https://facebook.com/in/tkzfallen.anz"><i class="fab fa-facebook"></i></a>
</div>
  </div>

  <!-- WORKS -->
  <h2 class="section-title">Selected Works</h2>

  <div class="works">
    <div class="work glass">
      <img src="work1.jpg" alt="">
    </div>

    <div class="work glass">
      <img src="work2.jpg" alt="">
    </div>

    <div class="work glass">
      <img src="work3.jpg" alt="">
    </div>

    <div class="work glass">
      <img src="work4.jpg" alt="">
    </div>
  </div>

  <!-- FOOTER -->
  <div class="footer">
    © 2026 Takie
  </div>

</div>

</body>
</html>
